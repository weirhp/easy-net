mixed-port: 7890
socks-port: 7891
allow-lan: false
bind-address: 127.0.0.1
mode: rule
log-level: info
find-process-mode: strict
external-controller: 127.0.0.1:9090
external-controller-cors:
  allow-origins:
    - '*'
  allow-private-network: true
external-ui: ui
external-ui-name: xd
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  strict-route: false
  dns-hijack:
    - any:53

dns:
  enable: true
  listen: 127.0.0.1:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 223.5.5.5
    - 119.29.29.29

proxies:
  - name: "Easy-Net 1025"
    type: socks5
    server: 127.0.0.1
    port: 1084
    udp: false
  - name: "Easy-Net 9025"
    type: socks5
    server: 127.0.0.1
    port: 1087
    udp: false

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - "Easy-Net 1025"
      - "Easy-Net 9025"
      - DIRECT

rules:
  - PROCESS-NAME,mihomo.exe,DIRECT
  - PROCESS-NAME,proxy-go.exe,DIRECT
  - PROCESS-NAME,proxy-go-silent.exe,DIRECT
  - PROCESS-NAME,easy-net-manager.exe,DIRECT
  - PROCESS-NAME,Telegram.exe,PROXY
  - PROCESS-NAME,Discord.exe,PROXY
  - MATCH,DIRECT
